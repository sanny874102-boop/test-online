<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>🏆 全班秒刷 (終極相機相容版)</title>
  <script src="https://cdn.jsdelivr.net/gh/jcmellado/js-aruco@master/src/cv.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/jcmellado/js-aruco@master/src/aruco.js"></script>
  <style>
    body { font-family: sans-serif; background: #2c3e50; color: white; text-align: center; margin: 0; padding: 20px; }
    #question-area { background: white; color: #333; border-radius: 20px; padding: 30px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    #q-text { font-size: 42px; font-weight: bold; color: #d35400; }
    #opts { font-size: 28px; text-align: left; display: inline-block; line-height: 1.8; margin-top: 15px; }
    .btn { font-size: 24px; padding: 15px 40px; cursor: pointer; border-radius: 50px; border: none; background: #f39c12; color: white; font-weight: bold; margin: 5px; }
    video { width: 100%; max-width: 500px; border-radius: 15px; border: 4px solid #27ae60; background: #000; margin-top: 15px; }
    #res { font-size: 22px; margin-top: 15px; color: #2ecc71; font-weight: bold; }
  </style>
</head>
<body>

<div id="question-area">
  <div id="q-text">請點擊「隨機抽題」</div>
  <div id="opts"></div>
</div>

<button class="btn" onclick="drawQ()">🎲 1. 隨機抽題</button>
<button class="btn" id="camBtn" onclick="initCamera()" style="background:#27ae60;">🎥 2. 開啟鏡頭</button>

<br>
<video id="v" autoplay playsinline muted></video>
<canvas id="c" style="display:none"></canvas>
<div id="res">🟢 系統待命</div>

<script>
  // 🌟 使用您在 image_051296 中寫好的 Apps Script 網址
  const API_URL = "https://script.google.com/macros/s/AKfycbwRLe2VvIOZLRlQVNy2VM6eKR13gYDc2mXDpeZuZNL9tDtmdVBkHJZAXeyuDQ9u4n0aVQ/exec";

  var v = document.getElementById('v'), c = document.getElementById('c'), ctx = c.getContext('2d'), rD = document.getElementById('res');
  var detector, scanActive = false, currentAns = "", scannedMap = {};

  // 1. 抽題功能
  function drawQ() {
    rD.innerHTML = "⏳ 讀取試算表中...";
    fetch(API_URL + "?action=getQuiz&t=" + Date.now()).then(res => res.json()).then(data => {
      const q = data[0];
      document.getElementById('q-text').innerText = "題目：" + q.q;
      document.getElementById('opts').innerHTML = "(A) "+q.a+"<br>(B) "+q.b+"<br>(C) "+q.c+"<br>(D) "+q.d;
      currentAns = q.ans;
      scannedMap = {};
      rD.innerHTML = "🎯 載入成功！請點『開啟鏡頭』";
    }).catch(err => { rD.innerHTML = "❌ 無法讀取題庫"; });
  }

  // 2. 暴力開啟鏡頭邏輯
  async function initCamera() {
    rD.innerHTML = "🎥 正在喚醒鏡頭...";
    detector = new AR.Detector();
    
    // 優先嘗試後鏡頭，失敗則改用預設鏡頭
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
      startVideoStream(stream);
    } catch (e) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        startVideoStream(stream);
      } catch (err) {
        rD.innerHTML = "❌ 鏡頭拒絕開啟：" + err.message;
        alert("請確認：\n1. 網址列左側鎖頭已允許相機\n2. 沒有其他程式(如LINE)在使用相機");
      }
    }
  }

  function startVideoStream(stream) {
    v.srcObject = stream;
    scanActive = true;
    document.getElementById('camBtn').innerText = "🛑 停止掃描";
    document.getElementById('camBtn').style.background = "#e74c3c";
    rD.innerHTML = "🚀 掃描中，請對準卡片";
    tick();
  }

  function tick() {
    if(!scanActive) return;
    if(v.readyState === v.HAVE_ENOUGH_DATA){
      c.width = v.videoWidth; c.height = v.videoHeight;
      ctx.drawImage(v, 0, 0, c.width, c.height);
      var markers = detector.detect(ctx.getImageData(0, 0, c.width, c.height));
      if(markers.length > 0){
        var id = markers[0].id;
        if(!scannedMap[id]){
          scannedMap[id] = true;
          var ans = ["A","B","C","D"][markers[0].rotation];
          
          // 紀錄成績回 Responses
          fetch(`${API_URL}?action=record&id=${id}&ans=${ans}&t=${Date.now()}`, {mode:'no-cors'});
          
          rD.innerHTML = (ans === currentAns) ? `✅ ${id} 號答對了！` : `❌ ${id} 號選了 ${ans}`;
          setTimeout(() => { delete scannedMap[id]; }, 3000);
        }
      }
    }
    requestAnimationFrame(tick);
  }
</script>
</body>
</html>
